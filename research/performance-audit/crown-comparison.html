<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crown-jewel transition comparison</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; background: #111; color: #fff; font: 14px/1.4 system-ui, sans-serif; }
      main { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 18px; }
      figure { margin: 0; }
      figcaption { margin-bottom: 8px; color: #c8cbcc; }
      img { display: block; width: 100%; aspect-ratio: 1.25; object-fit: contain; object-position: top center; background: #e8eaeb; }
    </style>
  </head>
  <body>
    <main>
      <figure>
        <figcaption>Reference</figcaption>
        <img src="./reference-crown-jewel-final.png" alt="Reference final reader" />
      </figure>
      <figure>
        <figcaption>Implementation</figcaption>
        <img src="./30-crown-jewel-final.png" alt="Implemented final reader" />
      </figure>
    </main>
  </body>
</html>
