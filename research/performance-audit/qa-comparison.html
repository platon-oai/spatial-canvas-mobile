<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spatial QA comparison</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 20px; color: #16191a; background: #dfe2e3; font: 12px/1.3 system-ui, sans-serif; }
      main { display: grid; gap: 18px; }
      section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; min-height: 330px; }
      figure { display: grid; grid-template-rows: 24px 1fr; min-width: 0; margin: 0; overflow: hidden; border: 1px solid rgba(0,0,0,.12); border-radius: 14px; background: #f6f7f7; }
      figcaption { display: flex; align-items: center; padding: 0 10px; border-bottom: 1px solid rgba(0,0,0,.08); font-weight: 650; }
      img { width: 100%; height: 100%; min-height: 0; object-fit: contain; background: #e8eaeb; }
    </style>
  </head>
  <body>
    <main>
      <section>
        <figure><figcaption>Reference — multi-selection</figcaption><img src="./reference-multiselect.png" alt="Reference multi-selection" /></figure>
        <figure><figcaption>Implementation — multi-selection</figcaption><img src="./25-live-multiselect-final.png" alt="Implementation multi-selection" /></figure>
      </section>
      <section>
        <figure><figcaption>Reference — selected command bar</figcaption><img src="./reference-command-bar.png" alt="Reference command bar" /></figure>
        <figure><figcaption>Implementation — phone selection</figcaption><img src="./26-phone-selection-final.png" alt="Implementation phone selection" /></figure>
      </section>
      <section>
        <figure><figcaption>Reference — image detail</figcaption><img src="./reference-image-detail.png" alt="Reference image detail" /></figure>
        <figure><figcaption>Implementation — retained image detail</figcaption><img src="./24-image-detail-final.png" alt="Implementation image detail" /></figure>
      </section>
    </main>
  </body>
</html>
